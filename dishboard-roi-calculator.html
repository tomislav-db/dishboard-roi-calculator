<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROI Calculator — Dishboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eef5ff',
              100: '#d9e8ff',
              200: '#bcd5ff',
              300: '#8eb9ff',
              400: '#5b91ff',
              500: '#3468fa',
              600: '#1e48ef',
              700: '#1636db',
              800: '#182db1',
              900: '#192b8c',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          },
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }

    /* Step transition */
    .step-enter { opacity: 0; transform: translateX(32px); }
    .step-leave { opacity: 0; transform: translateX(-32px); }
    .step-active { transition: opacity 0.3s ease, transform 0.3s ease; }

    /* Slider styling */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #e2e8f0;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1e48ef;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(30,72,239,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 3px 10px rgba(30,72,239,0.45);
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #1e48ef;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(30,72,239,0.35);
    }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #1e48ef 0%, #5b91ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Card hover */
    .type-card {
      transition: all 0.2s ease;
    }
    .type-card:hover {
      transform: translateY(-2px);
    }

    /* Country card */
    .country-card {
      transition: all 0.2s ease;
    }
    .country-card:hover {
      transform: translateY(-2px);
    }

    /* Glow on active result */
    .roi-hero {
      background: linear-gradient(135deg, #1e48ef 0%, #3468fa 50%, #5b91ff 100%);
    }

    /* Subtle background pattern */
    body {
      background-color: #f1f5f9;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* Count animation */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeInUp {
      animation: fadeInUp 0.5s ease forwards;
    }

    /* Number input hide arrows */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 py-12 font-sans">

  <div
    x-data="calculator()"
    x-cloak
    class="w-full max-w-2xl"
  >
    <!-- Header — always English -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <div class="w-8 h-8 rounded-lg bg-brand-600 flex items-center justify-center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3h18v18H3V3z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M7 17l4-6 3 4 2-3 3 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="text-slate-800 font-bold text-lg tracking-tight">Dishboard</span>
      </div>
      <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">ROI Calculator</h1>
      <p class="text-slate-500 mt-1 text-sm">Find out how much your restaurant is leaking — and how to stop it.</p>
    </div>

    <!-- Progress Bar -->
    <div class="flex items-center justify-center gap-2 mb-8" x-show="step <= 5">
      <template x-for="s in [1,2,3,4,5]" :key="s">
        <div class="flex items-center gap-2">
          <div
            class="flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold transition-all duration-300"
            :class="{
              'bg-brand-600 text-white shadow-md shadow-brand-200': step === s,
              'bg-brand-600 text-white opacity-80': step > s,
              'bg-white text-slate-400 border border-slate-200': step < s
            }"
          >
            <template x-if="step > s">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </template>
            <template x-if="step <= s">
              <span x-text="s"></span>
            </template>
          </div>
          <span
            class="text-xs font-medium hidden sm:block transition-colors duration-300"
            :class="step >= s ? 'text-slate-700' : 'text-slate-400'"
            x-text="stepLabel(s)"
          ></span>
          <template x-if="s < 5">
            <div class="w-6 h-px" :class="step > s ? 'bg-brand-600' : 'bg-slate-200'"></div>
          </template>
        </div>
      </template>
    </div>

    <!-- CARD -->
    <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/80 border border-slate-100 overflow-hidden">

      <!-- ==================== STEP 1: COUNTRY — always English ==================== -->
      <div x-show="step === 1" class="p-8 sm:p-10">
        <h2 class="text-2xl font-bold text-slate-900 mb-1">Where is your restaurant?</h2>
        <p class="text-slate-500 text-sm mb-8">We'll use local benchmarks and your currency.</p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
          <template x-for="c in countries" :key="c.code">
            <button
              @click="selectCountry(c.code)"
              class="country-card rounded-2xl border-2 p-6 text-center cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-400"
              :class="country === c.code
                ? 'border-brand-600 bg-brand-50 shadow-md shadow-brand-100'
                : 'border-slate-100 bg-slate-50 hover:border-slate-300'"
            >
              <div class="text-4xl mb-3" x-text="c.flag"></div>
              <div class="font-semibold text-slate-800 text-sm" x-text="c.name"></div>
              <div class="text-xs text-slate-400 mt-1" x-text="c.currency + ' ' + c.symbol"></div>
            </button>
          </template>
        </div>

        <div class="mt-8 flex justify-end">
          <button
            @click="step = 2"
            :disabled="!country"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all duration-200"
            :class="country
              ? 'bg-brand-600 hover:bg-brand-700 text-white shadow-md shadow-brand-200 hover:shadow-lg hover:shadow-brand-200'
              : 'bg-slate-100 text-slate-400 cursor-not-allowed'"
          >
            Continue
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- ==================== STEP 2: BUSINESS TYPE ==================== -->
      <div x-show="step === 2" class="p-8 sm:p-10">
        <button @click="step = 1" class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-600 mb-6 transition-colors">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span x-text="t('back')"></span>
        </button>
        <h2 class="text-2xl font-bold text-slate-900 mb-1" x-text="t('s2_heading')"></h2>
        <p class="text-slate-500 text-sm mb-8" x-text="t('s2_sub')"></p>

        <div class="grid grid-cols-2 gap-4">
          <template x-for="bt in businessTypes" :key="bt.key">
            <button
              @click="selectBusinessType(bt.key)"
              class="type-card rounded-2xl border-2 p-5 text-left cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-400"
              :class="businessType === bt.key
                ? 'border-brand-600 bg-brand-50 shadow-md shadow-brand-100'
                : 'border-slate-100 bg-slate-50 hover:border-slate-300'"
            >
              <div class="text-3xl mb-3" x-text="bt.icon"></div>
              <div class="font-semibold text-slate-800 text-sm leading-tight" x-text="btLabel(bt.key)"></div>
              <div class="text-xs text-slate-400 mt-1" x-text="btSub(bt.key)"></div>
            </button>
          </template>
        </div>

        <div class="mt-8 flex justify-end">
          <button
            @click="step = 3"
            :disabled="!businessType"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm transition-all duration-200"
            :class="businessType
              ? 'bg-brand-600 hover:bg-brand-700 text-white shadow-md shadow-brand-200 hover:shadow-lg hover:shadow-brand-200'
              : 'bg-slate-100 text-slate-400 cursor-not-allowed'"
          >
            <span x-text="t('continue_btn')"></span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- ==================== STEP 3: NUMBERS ==================== -->
      <div x-show="step === 3" class="p-8 sm:p-10">
        <button @click="step = 2" class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-600 mb-6 transition-colors">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span x-text="t('back')"></span>
        </button>
        <h2 class="text-2xl font-bold text-slate-900 mb-1" x-text="t('s3_heading')"></h2>
        <p class="text-slate-500 text-sm mb-8" x-text="t('s3_sub')"></p>

        <!-- Monthly Revenue -->
        <div class="mb-8">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-slate-700" x-text="t('lbl_monthly_revenue')"></label>
            <div class="flex items-center gap-1">
              <span class="text-xs font-medium text-slate-500" x-text="currentCountry().symbol"></span>
              <input
                type="number"
                x-model.number="monthlyRevenue"
                @input="clampRevenue()"
                class="w-28 text-right text-sm font-bold text-slate-900 border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-brand-400"
              />
            </div>
          </div>
          <input
            type="range"
            x-model.number="monthlyRevenue"
            :min="currentCountry().revenueMin"
            :max="currentCountry().revenueMax"
            :step="currentCountry().revenueStep"
            class="w-full accent-brand-600"
          />
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span x-text="formatCurrency(currentCountry().revenueMin)"></span>
            <span x-text="formatCurrency(currentCountry().revenueMax)"></span>
          </div>
          <p class="text-xs text-slate-400 mt-1">
            <span x-text="t('benchmark_for')"></span>
            <span class="font-medium text-slate-600 mx-1" x-text="btLabel(businessType)"></span>:
            <span class="font-semibold text-brand-600" x-text="formatCurrency(benchmark().revenue)"></span><span x-text="t('per_month')"></span>
          </p>
        </div>

        <!-- ── BAR / CAFÉ: Do you serve food? ── -->
        <div x-show="businessType === 'bar' || businessType === 'cafe'" class="mb-8">
          <label class="text-sm font-semibold text-slate-700 block mb-3" x-text="t('lbl_food_question')"></label>
          <div class="flex gap-3">
            <button
              @click="hasFood = true; beverageRevenuePercent = (businessType === 'cafe' ? 60 : 80)"
              class="flex-1 py-3 rounded-xl border-2 text-sm font-semibold transition-all duration-200 focus:outline-none"
              :class="hasFood ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-slate-200 bg-slate-50 text-slate-500 hover:border-slate-300'"
              x-text="t('btn_yes_food')"
            ></button>
            <button
              @click="hasFood = false; beverageRevenuePercent = 100"
              class="flex-1 py-3 rounded-xl border-2 text-sm font-semibold transition-all duration-200 focus:outline-none"
              :class="!hasFood ? 'border-brand-600 bg-brand-50 text-brand-700' : 'border-slate-200 bg-slate-50 text-slate-500 hover:border-slate-300'"
              x-text="businessType === 'cafe' ? t('btn_drinks_only_cafe') : t('btn_drinks_only_bar')"
            ></button>
          </div>
        </div>

        <!-- ── BAR / CAFÉ: Revenue split (only if has food) ── -->
        <div x-show="(businessType === 'bar' || businessType === 'cafe') && hasFood" class="mb-8">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-slate-700" x-text="t('lbl_revenue_split')"></label>
            <span class="text-sm font-bold text-slate-900">
              <span class="text-slate-500" x-text="t('lbl_food')"></span> <span x-text="(100 - beverageRevenuePercent) + '%'"></span>
              &nbsp;/&nbsp;
              <span class="text-slate-500" x-text="t('lbl_drinks')"></span> <span x-text="beverageRevenuePercent + '%'"></span>
            </span>
          </div>
          <!-- Visual split bar -->
          <div class="flex rounded-lg overflow-hidden h-5 mb-3 text-xs font-semibold">
            <div class="flex items-center justify-center bg-emerald-500 text-white transition-all duration-200" :style="'width:' + (100 - beverageRevenuePercent) + '%'" x-show="beverageRevenuePercent < 100">
              <span x-show="(100 - beverageRevenuePercent) > 15" x-text="(100 - beverageRevenuePercent) + '%'"></span>
            </div>
            <div class="flex items-center justify-center bg-violet-500 text-white transition-all duration-200" :style="'width:' + beverageRevenuePercent + '%'">
              <span x-show="beverageRevenuePercent > 15" x-text="beverageRevenuePercent + '%'"></span>
            </div>
          </div>
          <input
            type="range"
            x-model.number="beverageRevenuePercent"
            min="50"
            max="100"
            step="5"
            class="w-full accent-brand-600"
          />
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span x-text="t('slider_50_drinks')"></span>
            <span x-text="t('slider_100_drinks')"></span>
          </div>
          <p class="text-xs text-slate-400 mt-1">
            <span x-text="t('benchmark_for')"></span>
            <span class="mx-1" x-text="businessType === 'cafe' ? t('benchmark_cafe_type') : t('benchmark_bar_type')"></span>:
            <span class="font-semibold text-brand-600" x-text="businessType === 'cafe' ? t('benchmark_cafe_split') : t('benchmark_bar_split')"></span>
          </p>
        </div>

        <!-- ── BAR / CAFÉ: Pour / Drink Cost % ── -->
        <div x-show="businessType === 'bar' || businessType === 'cafe'" class="mb-8">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-slate-700" x-text="businessType === 'cafe' ? t('lbl_drink_cost') : t('lbl_pour_cost')"></label>
            <span class="text-sm font-bold text-slate-900" x-text="pourCostPercent.toFixed(1) + '%'"></span>
          </div>
          <input
            type="range"
            x-model.number="pourCostPercent"
            min="5"
            max="50"
            step="0.5"
            class="w-full accent-brand-600"
          />
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span>5%</span>
            <span>50%</span>
          </div>
          <p class="text-xs text-slate-400 mt-1" x-show="businessType === 'bar'">
            <span x-text="t('benchmark_pour')"></span> <span class="font-semibold text-brand-600">18–24%</span>
            &nbsp;·&nbsp; <span x-text="t('pour_note')"></span>
          </p>
          <p class="text-xs text-slate-400 mt-1" x-show="businessType === 'cafe'">
            <span x-text="t('benchmark_pour')"></span> <span class="font-semibold text-brand-600">25–32%</span>
            &nbsp;·&nbsp; <span x-text="t('cafe_drink_note')"></span>
          </p>
        </div>

        <!-- Food Cost % — hidden for bars/cafés with no food, shown for all others -->
        <div x-show="(businessType !== 'bar' && businessType !== 'cafe') || hasFood" class="mb-8">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-slate-700" x-text="t('lbl_food_cost')"></label>
            <span class="text-sm font-bold text-slate-900" x-text="foodCostPercent.toFixed(1) + '%'"></span>
          </div>
          <input
            type="range"
            x-model.number="foodCostPercent"
            min="5"
            max="60"
            step="0.5"
            class="w-full accent-brand-600"
          />
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span>5%</span>
            <span>60%</span>
          </div>
          <p class="text-xs text-slate-400 mt-1">
            <span x-text="t('benchmark_for')"></span>
            <span class="font-medium text-slate-600 mx-1" x-text="btLabel(businessType)"></span>:
            <span class="font-semibold text-brand-600" x-text="benchmark().foodCost + '%'"></span>
            <template x-if="businessType === 'bar'"><span class="text-slate-400" x-text="' ' + t('food_cost_bar_note')"></span></template>
          </p>
        </div>

        <!-- Monthly Invoices -->
        <div class="mb-6">
          <div class="flex items-center justify-between mb-2">
            <label class="text-sm font-semibold text-slate-700" x-text="t('lbl_invoices')"></label>
            <input
              type="number"
              x-model.number="monthlyInvoices"
              @input="clampInvoices(); updateAdminHours()"
              @change="updateAdminHours()"
              class="w-20 text-right text-sm font-bold text-slate-900 border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-brand-400"
            />
          </div>
          <input
            type="range"
            x-model.number="monthlyInvoices"
            min="10"
            max="300"
            step="5"
            @input="updateAdminHours()"
            class="w-full accent-brand-600"
          />
          <div class="flex justify-between text-xs text-slate-400 mt-1">
            <span>10</span>
            <span>300</span>
          </div>
          <p class="text-xs text-slate-400 mt-2">
            <span x-text="t('benchmark_for')"></span>
            <span class="font-medium text-slate-600 mx-1" x-text="btLabel(businessType)"></span>:
            <span class="font-semibold text-brand-600" x-text="benchmark().invoices + ' ' + t('invoices_per_month')"></span>
          </p>
        </div>

        <!-- Management Style -->
        <div class="mb-8">
          <div class="mb-3">
            <label class="text-sm font-semibold text-slate-700" x-text="t('lbl_mgmt')"></label>
            <p class="text-xs text-slate-400 mt-0.5" x-text="t('mgmt_sub')"></p>
          </div>
          <div class="grid grid-cols-3 gap-3">
            <template x-for="level in managementLevels" :key="level.key">
              <button
                @click="managementStyle = level.key"
                class="type-card rounded-2xl border-2 p-4 text-left cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-400"
                :class="managementStyle === level.key
                  ? 'border-brand-600 bg-brand-50 shadow-md shadow-brand-100'
                  : 'border-slate-100 bg-slate-50 hover:border-slate-300'"
              >
                <div class="font-semibold text-slate-800 text-sm leading-tight mb-1.5" x-text="mlLabel(level.key)"></div>
                <div class="text-xs text-slate-400 leading-snug" x-text="mlSub(level.key)"></div>
              </button>
            </template>
          </div>
        </div>

        <div class="flex justify-end">
          <button
            @click="goToPlan()"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm bg-brand-600 hover:bg-brand-700 text-white shadow-md shadow-brand-200 hover:shadow-lg hover:shadow-brand-200 transition-all duration-200"
          >
            <span x-text="t('continue_btn')"></span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <!-- ==================== STEP 4: PLAN SELECTION ==================== -->
      <div x-show="step === 4" class="p-8 sm:p-10">
        <button @click="step = 3" class="flex items-center gap-1 text-xs text-slate-400 hover:text-slate-600 mb-6 transition-colors">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 3L4 7l5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span x-text="t('back')"></span>
        </button>
        <h2 class="text-2xl font-bold text-slate-900 mb-1" x-text="t('s4_heading')"></h2>
        <p class="text-slate-500 text-sm mb-2" x-html="t('s4_sub')"></p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
          <template x-for="tier in pricingTiers" :key="tier.key">
            <button
              @click="selectedTier = tier.key"
              class="type-card rounded-2xl border-2 p-5 text-left cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-400 relative"
              :class="selectedTier === tier.key
                ? 'border-brand-600 bg-brand-50 shadow-md shadow-brand-100'
                : 'border-slate-100 bg-slate-50 hover:border-slate-300'"
            >
              <p class="text-xs font-semibold uppercase tracking-wide mb-3"
                :class="selectedTier === tier.key ? 'text-brand-600' : 'text-slate-400'"

        lang() {

        },
        t(key) {
          const l = this.lang();
          const val = this.translations[l] && this.translations[l][key] !== undefined
            ? this.translations[l][key]
            : this.translations.en[key];
          return val !== undefined ? val : key;
        },
        stepLabel(s) {
          return this.t(['step1','step2','step3','step4','step5'][s - 1]);
        },
        btLabel(key) { return this.t('bt_' + key + '_label'); },
        btSub(key)   { return this.t('bt_' + key + '_sub'); },
        mlLabel(key) { return this.t('ml_' + key + '_label'); },
        mlSub(key)   { return this.t('ml_' + key + '_sub'); },

        card1Title() {
          if (this.businessType === 'bar' && !this.hasFood) return this.t('card1_title_pour');
          if (this.businessType === 'bar') return this.t('card1_title_fbev');
          return this.t('card1_title_food');
        },
        card1Desc() {
          if (this.businessType === 'bar' && !this.hasFood) return this.t('card1_desc_pour');
          if (this.businessType === 'bar') return this.t('card1_desc_fbev');
          return this.t('card1_desc_food');
        },

        heroMoreRadar() {
          return '+ ' + this.formatCurrency(this.radarSavings()) + this.t('hero_more_post');
        },

        invoiceNote() {
          let text = this.t('invoices_included');
          if (this.planInvoices > 150) {
            const blocks = (this.planInvoices - 150) / 50;
            const blockWord = blocks > 1 ? this.t('invoice_extra_blocks') : this.t('invoice_extra_block');
            text += ' · ' + blocks + ' ' + blockWord + ' ' + this.t('invoice_at') + ' '
                  + this.formatCurrency(this.currentCountry().invoiceBlockPrice) + this.t('invoice_per_50');
          }
          return text;
        },

        roiForEvery() {
          const c = this.currentCountry();
          const one = c.symbolAfter ? '1 ' + c.symbol : c.symbol + '1';
          return this.t('roi_for_every').replace('{one}', one);
        },
        roiYouSave() {
          const c = this.currentCountry();
          const val = c.symbolAfter ? this.roiMultiple() + ' ' + c.symbol : c.symbol + this.roiMultiple();
          return this.t('roi_you_save').replace('{val}', val);
        },

        },
        mgmtMultiplier() {
          const level = this.managementLevels.find(l => l.key === this.managementStyle);
          return level ? level.multiplier : 1.0;
        },
        venueSizeModifier() {
          const ratio = this.monthlyRevenue / this.benchmark().revenue;
          if (ratio < 0.6) return 1.1;   // small — more leakage, more to gain
          if (ratio < 1.5) return 1.0;   // mid — case study territory, no change
          if (ratio < 3.0) return 0.8;   // large — some controls already exist
          return 0.35;                    // very large — purchasing team, tight controls
        },
        radarRate() {
          const ratio = this.monthlyRevenue / this.benchmark().revenue;
          if (ratio < 0.6) return 0.040;  // small — uncontrolled, suppliers take advantage
          if (ratio < 1.5) return 0.035;  // mid — Beverley Hills case study validated
          if (ratio < 3.0) return 0.025;  // large — some supplier controls exist
          return 0.008;                    // very large — dedicated purchasing, tight
        },

        // ── CURRENCY FORMATTING ──────────────────────────────────
        formatCurrency(val) {
          const c = this.currentCountry();
          const rounded = Math.round(val);
          const parts = rounded.toString().split('.');
          parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, c.thousandSep);
          const num = parts.join('.');
          return c.symbolAfter ? num + ' ' + c.symbol : c.symbol + num;
        },

        // ── CALCULATIONS ─────────────────────────────────────────
        annualRevenue() { return this.monthlyRevenue * 12; },

        annualFoodBevSpend() {
          if (this.businessType === 'bar' || this.businessType === 'cafe') {
            const foodSpend = this.hasFood
              ? this.annualRevenue() * ((100 - this.beverageRevenuePercent) / 100) * (this.foodCostPercent / 100)
              : 0;
            const bevSpend = this.annualRevenue() * (this.beverageRevenuePercent / 100) * (this.pourCostPercent / 100);
            return foodSpend + bevSpend;
          }
          return this.annualRevenue() * (this.foodCostPercent / 100);
        },

        foodSavingsRate() {
          const useDrinkCost = this.businessType === 'bar' || (this.businessType === 'cafe' && !this.hasFood);
          const fc = useDrinkCost ? this.pourCostPercent : this.foodCostPercent;
          if (fc < 28) return 0.01;
          if (fc < 32) return 0.02;
          if (fc < 37) return 0.03;
          return 0.04;
        },

        foodCostSavings() {
          if (this.businessType === 'bar' || this.businessType === 'cafe') {
            const bevSpend  = this.annualRevenue() * (this.beverageRevenuePercent / 100) * (this.pourCostPercent / 100);
            const foodSpend = this.hasFood
              ? this.annualRevenue() * ((100 - this.beverageRevenuePercent) / 100) * (this.foodCostPercent / 100)
              : 0;
            return (bevSpend + foodSpend) * this.foodSavingsRate() * this.mgmtMultiplier() * this.venueSizeModifier();
          }
          return this.annualRevenue() * (this.foodCostPercent / 100) * this.foodSavingsRate() * this.mgmtMultiplier() * this.venueSizeModifier();
        },

        transparencySavingsRate() {
          const ratio = this.monthlyRevenue / this.benchmark().revenue;
          if (ratio < 0.4) return 0.008;
          if (ratio < 0.8) return 0.005;
          if (ratio < 2.0) return 0.0035;
          return 0.0024;
        },
        errorSavings() {
          const raw = this.annualRevenue() * this.transparencySavingsRate();
          return Math.min(raw, this.currentCountry().bucket2Cap * 12);
        },

        radarSavings() { return this.annualFoodBevSpend() * this.radarRate(); },

        hoursSavedPerMonth() {
          const hrs = 15 + (Math.min(this.monthlyInvoices, 200) - 50) * (15 / 150);
          return Math.round(Math.max(15, hrs));
        },
        hoursSavedPerYear() { return this.hoursSavedPerMonth() * 12; },

        totalROI() {
          const gross = this.foodCostSavings()
                      + this.errorSavings()
                      + (this.hasCostRadar ? this.radarSavings() : 0);
          return Math.max(gross, this.annualDishboardCost() * 1.15);
        },

        radarMonthly() {
          return this.hasCostRadar ? this.currentCountry().radarPrice : 0;
        },
        invoiceOverageMonthly() {
          const blocks = (this.planInvoices - 150) / 50;
          return blocks * this.currentCountry().invoiceBlockPrice;
        },
        totalMonthlyPlan() {
          if (!this.selectedTier || !this.country) return 0;
          return this.currentTier().prices[this.country]
               + this.radarMonthly()
               + this.invoiceOverageMonthly();
        },
        annualDishboardCost() {
          return this.totalMonthlyPlan() * 12;
        },
        netROI()      { return Math.max(0, this.totalROI() - this.annualDishboardCost()); },
        roiMultiple() {
          const cost = this.annualDishboardCost();
          if (!cost) return '∞';
          return (this.totalROI() / cost).toFixed(1);
        },

        calcAdminHours(invoices) { return Math.max(1, Math.round(invoices * 0.30)); },

        // ── ACTIONS ──────────────────────────────────────────────
        selectCountry(code) {
          this.country = code;
          this.businessType = '';
        },

        selectBusinessType(key) {
          this.businessType = key;
          const b = this.benchmarks[this.country][key];
          this.monthlyRevenue = b.revenue;
          this.foodCostPercent = b.foodCost;
          this.monthlyInvoices = b.invoices;
          this.adminHours = this.calcAdminHours(b.invoices);
          if (key === 'bar') {
            this.hasFood = true;
            this.beverageRevenuePercent = 80;
            this.pourCostPercent = 22;
          }
          if (key === 'cafe') {
            this.hasFood = true;
            this.beverageRevenuePercent = 60;
            this.pourCostPercent = 28;
          }
        },

        updateAdminHours() {
          this.adminHours = this.calcAdminHours(this.monthlyInvoices);
        },

        clampRevenue() {
          const c = this.currentCountry();
          this.monthlyRevenue = Math.min(Math.max(this.monthlyRevenue, c.revenueMin), c.revenueMax);
        },

        clampInvoices() {
          this.monthlyInvoices = Math.min(Math.max(this.monthlyInvoices, 10), 300);
        },

        goToPlan() {
          const raw = Math.max(150, Math.min(300, this.monthlyInvoices));
          this.planInvoices = Math.min(300, Math.ceil(raw / 50) * 50);
          this.step = 4;
        },

        goToResults() {
          this.step = 5;
          this.$nextTick(() => this.animateCounter());
        },

        animateCounter() {
          const target = this.netROI();
          const duration = 1600;
          const startTime = performance.now();
          const easeOut = t => 1 - Math.pow(1 - t, 3);

          const tick = (now) => {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            this.displayTotal = Math.round(easeOut(progress) * target);
            if (progress < 1) requestAnimationFrame(tick);
            else this.displayTotal = target;
          };
          this.displayTotal = 0;
          requestAnimationFrame(tick);
        },

        reset() {
          this.step = 1;
          this.country = '';
          this.businessType = '';
          this.selectedTier = '';
          this.monthlyRevenue = 0;
          this.foodCostPercent = 30;
          this.monthlyInvoices = 100;
          this.adminHours = 26;
          this.displayTotal = 0;
          this.hasFood = true;
          this.beverageRevenuePercent = 80;
          this.pourCostPercent = 22;
          this.hasCostRadar = false;
          this.planInvoices = 150;
          this.managementStyle = '';
        },
      };
    }
  </script>
